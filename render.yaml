services:
  - type: web
    name: maya-atlas-api
    runtime: python
    rootDir: apps/api
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: maya-atlas-db
          property: connectionString
      - key: API_CORS_ORIGINS
        sync: false
      - key: API_PUBLIC_ORIGIN
        sync: false

databases:
  - name: maya-atlas-db
    databaseName: maya_atlas
    user: maya_atlas
    plan: starter
